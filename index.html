<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Maths Pathshala</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: white;
      color: black;
      text-align: center;
    }

    /* Dark Mode */
    .dark-mode {
      background-color: black;
      color: white;
    }

    /* Toggle Button */
    .toggle-btn {
      position: fixed;
      top: 10px;
      right: 10px;
      padding: 10px 15px;
      cursor: pointer;
      border: none;
      background: #333;
      color: white;
      border-radius: 5px;
    }

    /* Popup Styling */
    .popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      color: black;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
      width: 300px;
      z-index: 1000;
    }

    /* Dark popup */
    .dark-mode .popup {
      background: #222;
      color: white;
    }

    /* Close Button */
    .close-btn {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 18px;
      cursor: pointer;
    }

    /* Overlay */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 999;
    }
  </style>
</head>

<body>

  <!-- Dark Mode Button -->
  <button class="toggle-btn" onclick="toggleMode()">🌙 Toggle Mode</button>

  <!-- Overlay -->
  <div id="overlay" class="overlay"></div>

  <!-- Popup -->
  <div id="popup" class="popup">
    <span class="close-btn" onclick="closePopup()">❌</span>
    
    <h2>Maths Pathshala</h2>
    <p><strong>Vipin Sir</strong></p>
    <p>Building Strong Foundation in Mathematics</p>
    <p>📍 Kalyanpur, Kanpur</p>
    <p>🎓 300+ Students Taught</p>
    <p>🏆 Many scored 90%+</p>
  </div>

  <!-- Main Content -->
  <h1>Welcome to Maths Pathshala</h1>
  <p>Best Coaching for Strong Mathematics Foundation</p>

  <script>
    function closePopup() {
      document.getElementById("popup").style.display = "none";
      document.getElementById("overlay").style.display = "none";
    }

    function toggleMode() {
      document.body.classList.toggle("dark-mode");
    }
  </script>

</body>
</html>
